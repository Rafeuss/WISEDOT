name: Execucao integrada

# Nivel de integracao: execucao integrada (Continuous Integration).
# Roda a suite completa a cada Pull Request aberto ou atualizado contra a
# branch principal, servindo de gate de qualidade antes do merge.

on:
  pull_request:
    branches:
      - main

jobs:
  run-suite:
    uses: ./.github/workflows/_reusable-test-suite.yml
