name: Execucao agendada

# Nivel de integracao: execucao agendada (schedule/cron).
# Roda a suite completa diariamente, permitindo detectar regressoes causadas
# por fatores externos ao codigo (ex: drift de ambiente, expiracao de
# certificado, dependencias desatualizadas) mesmo sem novos commits.

on:
  schedule:
    - cron: '0 6 * * *' # todos os dias as 06:00 UTC

jobs:
  run-suite:
    uses: ./.github/workflows/_reusable-test-suite.yml
