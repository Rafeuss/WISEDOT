name: Execucao por deploy

# Nivel de integracao: execucao por deploy.
# Roda a suite completa a cada push na branch principal (representando o
# momento de "deploy" do projeto de automacao), garantindo que nenhuma
# alteracao entra na branch principal sem a suite de regressao validada.

on:
  push:
    branches:
      - main

jobs:
  run-suite:
    uses: ./.github/workflows/_reusable-test-suite.yml
